---
name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions: {}
jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    permissions:
      id-token: write  # IMPORTANT: Mandatory for PyPI Trusted Publishing
      contents: write  # IMPORTANT: Mandatory to upload to and un-draft the release
      pull-requests: write  # IMPORTANT: Mandatory to close the phantom release PR
      actions: write  # IMPORTANT: Mandatory to re-dispatch the workflow below
    environment:
      name: publish
      url: https://pypi.org/project/cobo/${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # hatch-vcs derives the version from the git tag, so the build needs
          # full history and tags. fetch-depth: 0 fetches everything, including
          # the release tag, which `force-tag-creation` in the release-please
          # config makes release-please create immediately — GitHub otherwise
          # withholds the tag for a draft release until it is published.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build the package
        run: uv build --no-sources --quiet
      - name: Attach build artifacts to the draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" ./dist/* --clobber
      - name: Publish to PyPI
        run: uv publish --quiet --trusted-publishing always
      - name: Publish the GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false
      - name: Reconcile the next release PR against the now-published release
        # release-please derives its commit range from the latest *published*
        # GitHub Release and ignores drafts. The release-please job above opened
        # the next release PR in this same run, while this release was still a
        # draft, so that PR was computed with no baseline and re-lists every
        # already-shipped commit as a phantom version bump. release-please will
        # NOT clean that up on its own: when a later run finds no new commits it
        # just skips, leaving the orphan PR open. So close it here now that the
        # release is published, then re-dispatch the workflow. The re-dispatch
        # sees the published release and recreates a CORRECT next PR only if real
        # unreleased commits exist; otherwise it finds nothing and stops without
        # reaching this job again, so the re-trigger is bounded to one run.
        # (workflow_dispatch is the documented exception to GITHUB_TOKEN
        # loop-prevention, so no PAT is required.)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr="$(gh pr list --state open \
            --head release-please--branches--${{ github.ref_name }} \
            --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            echo "Closing phantom release PR #$pr"
            gh pr close "$pr" --delete-branch
          fi
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}"
  publish-docker:
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish Docker image to GHCR
    permissions:
      contents: read
      packages: write  # IMPORTANT: push the Docker-action image to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push the Docker-action image
        env:
          # The image installs cobo from PyPI, so it can only build once the
          # publish job above has uploaded this version — hence `needs: publish`.
          VERSION: ${{ needs.release-please.outputs.version }}
          IMAGE: ghcr.io/${{ github.repository }}
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          major="${VERSION%%.*}"
          # Retry to ride out PyPI index propagation right after publish: a fresh
          # version can take a short while to become pip-installable.
          for attempt in 1 2 3 4 5; do
            if docker build \
              --build-arg "COBO_VERSION=${VERSION}" \
              --tag "${IMAGE}:${VERSION}" \
              --tag "${IMAGE}:${major}" \
              --tag "${IMAGE}:latest" \
              --file docker/Dockerfile docker/; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::docker build failed after 5 attempts" >&2
              exit 1
            fi
            echo "Build failed (likely PyPI propagation lag); retrying in 30s…"
            sleep 30
          done
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${major}"
          docker push "${IMAGE}:latest"
