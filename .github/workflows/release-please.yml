---
name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions: {}
jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
  sync-lockfile:
    # release-please bumps the version in pyproject.toml but not in uv.lock,
    # which leaves the editable "cobo" entry stale and breaks every
    # `uv run --locked` job on the release PR. Regenerate the lockfile on the
    # release branch so it stays in sync.
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    runs-on: ubuntu-latest
    name: Sync uv.lock on release PR
    permissions:
      contents: write
    steps:
      - name: Checkout the release PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Sync the lockfile to the bumped version
        run: uv lock
      - name: Commit the lockfile via the API if it changed
        # Commit through the GitHub Contents API rather than `git push`. A push
        # authenticated with the default GITHUB_TOKEN is suppressed by GitHub's
        # loop-prevention and would NOT re-trigger CI, leaving the corrected
        # lockfile unverified. An API-authored commit (the same mechanism
        # release-please uses) does trigger the pull_request checks, with no PAT
        # or extra secret required.
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already in sync; nothing to commit."
            exit 0
          fi
          sha="$(gh api "repos/$REPO/contents/uv.lock?ref=$BRANCH" --jq .sha)"
          # Build the request body with jq and send it via --input. The base64
          # lockfile (~145 KB) must not be passed as a CLI argument or it blows
          # past ARG_MAX ("Argument list too long"); --rawfile and --input keep
          # it entirely off the command line.
          base64 -w0 uv.lock > content.b64
          jq -n \
            --arg message "chore: sync uv.lock with release version" \
            --arg branch "$BRANCH" \
            --arg sha "$sha" \
            --rawfile content content.b64 \
            '{message: $message, branch: $branch, sha: $sha, content: $content}' \
            | gh api "repos/$REPO/contents/uv.lock" --method PUT --input - --silent
          rm -f content.b64
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    permissions:
      id-token: write  # IMPORTANT: Mandatory for PyPI Trusted Publishing
      contents: write  # IMPORTANT: Mandatory to upload to and un-draft the release
      pull-requests: write  # IMPORTANT: Mandatory to close the phantom release PR
      actions: write  # IMPORTANT: Mandatory to re-dispatch the workflow below
    environment:
      name: publish
      url: https://pypi.org/project/cobo/${{ needs.release-please.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build the package
        run: uv build --no-sources --quiet
      - name: Attach build artifacts to the draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" ./dist/* --clobber
      - name: Publish to PyPI
        run: uv publish --quiet --trusted-publishing always
      - name: Publish the GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false
      - name: Reconcile the next release PR against the now-published release
        # release-please derives its commit range from the latest *published*
        # GitHub Release and ignores drafts. The release-please job above opened
        # the next release PR in this same run, while this release was still a
        # draft, so that PR was computed with no baseline and re-lists every
        # already-shipped commit as a phantom version bump. release-please will
        # NOT clean that up on its own: when a later run finds no new commits it
        # just skips, leaving the orphan PR open. So close it here now that the
        # release is published, then re-dispatch the workflow. The re-dispatch
        # sees the published release and recreates a CORRECT next PR only if real
        # unreleased commits exist; otherwise it finds nothing and stops without
        # reaching this job again, so the re-trigger is bounded to one run.
        # (workflow_dispatch is the documented exception to GITHUB_TOKEN
        # loop-prevention, so no PAT is required.)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr="$(gh pr list --state open \
            --head release-please--branches--${{ github.ref_name }} \
            --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            echo "Closing phantom release PR #$pr"
            gh pr close "$pr" --delete-branch
          fi
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref_name }}"
