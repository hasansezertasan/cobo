---
name: Release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions: {}
jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
      # Prerelease detection. release-please tags prereleases in SemVer form --
      # `v0.2.0-beta.1` -- which hatch-vcs normalizes to the PEP 440 `0.2.0b1`. A
      # final/graduated tag (`v0.2.0`) never contains a hyphen, so a `-` in the tag
      # is an unambiguous prerelease marker. Downstream jobs gate on this:
      # prereleases ship to PyPI (hidden from `pip install` without `--pre`) and
      # the GitHub release, but are kept OFF the moving Docker tags (`:latest`,
      # `:major`) so a beta never displaces the current stable image. The beta
      # channel is not enabled in release-please-config.json today, so this gate is
      # inert -- but binding the moment it is turned on.
      is_prerelease: ${{ contains(steps.release.outputs.tag_name, '-') }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
  build-package:
    # Pure producer, fed by the drafted release+tag: contents:read only, it never
    # touches the release. It uploads a workflow artifact that publish-release
    # attaches. The release is ATOMIC — publish-pypi needs this build, so nothing
    # ships unless the artifact built.
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Build sdist + wheel
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          # hatch-vcs derives the version from the git tag, so the build needs
          # full history and tags. fetch-depth: 0 fetches everything, including
          # the release tag, which `force-tag-creation` in the release-please
          # config makes release-please create immediately — GitHub otherwise
          # withholds the tag for a draft release until it is published.
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: ".python-version"
      - name: Setup uv
        id: setup-uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
      - name: Build the package
        run: uv build --no-sources --quiet
      - name: Upload the distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-pypi
          path: dist/
  publish-pypi:
    # Atomic gate: requires the build. A failed build blocks the PyPI release too
    # — nothing ships unless the artifact built.
    needs: [release-please, build-package]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    permissions:
      id-token: write  # IMPORTANT: Mandatory for PyPI Trusted Publishing (OIDC)
    environment:
      name: publish
      url: https://pypi.org/project/cobo/${{ needs.release-please.outputs.version }}
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
      - name: Download the distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-pypi
          path: dist
      - name: Publish to PyPI
        run: uv publish --quiet --trusted-publishing always
  publish-release:
    # Runs only after PyPI succeeds (which in turn required the build). Attaches
    # the distribution to the release and un-drafts it.
    needs: [release-please, publish-pypi]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish GitHub release
    permissions:
      contents: write  # IMPORTANT: Mandatory to upload assets and un-draft the release
    steps:
      - name: Download the release-asset artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          pattern: dist-*
      - name: Attach artifacts and publish the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no checkout, so gh has no git remote to infer the repo
          # from. gh reads --repo / GH_REPO (NOT GITHUB_REPOSITORY), so set it
          # explicitly or gh release upload/edit cannot resolve the repository.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          IS_PRERELEASE: ${{ needs.release-please.outputs.is_prerelease }}
        run: |
          mapfile -t files < <(find artifacts -type f)
          # Defensive: the build gates this job, so files should always exist —
          # but fail loudly rather than un-draft an empty release.
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::no artifacts found to attach to the release"; exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --clobber
          # Un-draft, and set the prerelease/latest flags explicitly. A beta is
          # marked --prerelease and kept OFF "Latest release" so it never displaces
          # the newest stable on the repo home; a graduated stable forces the
          # inverse (release-please flags drafts per the prerelease config, so the
          # stable branch must clear it, not assume the default).
          if [ "$IS_PRERELEASE" = "true" ]; then
            gh release edit "$TAG" --draft=false --prerelease --latest=false
          else
            gh release edit "$TAG" --draft=false --prerelease=false --latest
          fi
  publish-docker:
    # Best-effort downstream: builds the Docker-action image from the freshly
    # published PyPI package, so it gates on publish-pypi (not publish-release)
    # and runs in parallel with it.
    needs: [release-please, publish-pypi]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Publish Docker image to GHCR
    permissions:
      contents: read
      packages: write  # IMPORTANT: push the Docker-action image to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push the Docker-action image
        env:
          # The image installs cobo from PyPI, so it can only build once the
          # publish-pypi job above has uploaded this version — hence
          # `needs: publish-pypi`.
          VERSION: ${{ needs.release-please.outputs.version }}
          IS_PRERELEASE: ${{ needs.release-please.outputs.is_prerelease }}
          IMAGE: ghcr.io/${{ github.repository }}
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          major="${VERSION%%.*}"
          # Every image gets its exact `:VERSION` tag. The moving tags (`:major`,
          # `:latest`) are stable-only — a beta must never hijack them, or
          # `docker pull …:latest` would hand every user a prerelease. Betas stop
          # at the immutable `:VERSION` tag (mirrors the PyPI `--pre` opt-in).
          tags=(--tag "${IMAGE}:${VERSION}")
          if [ "${IS_PRERELEASE}" != "true" ]; then
            tags+=(--tag "${IMAGE}:${major}" --tag "${IMAGE}:latest")
          fi
          # Retry to ride out PyPI index propagation right after publish: a fresh
          # version can take a short while to become pip-installable.
          for attempt in 1 2 3 4 5; do
            if docker build \
              --build-arg "COBO_VERSION=${VERSION}" \
              "${tags[@]}" \
              --file docker/Dockerfile docker/; then
              break
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "::error::docker build failed after 5 attempts" >&2
              exit 1
            fi
            echo "Build failed (likely PyPI propagation lag); retrying in 30s…"
            sleep 30
          done
          docker push "${IMAGE}:${VERSION}"
          if [ "${IS_PRERELEASE}" != "true" ]; then
            docker push "${IMAGE}:${major}"
            docker push "${IMAGE}:latest"
          fi
  reconcile:
    # release-please derives its commit range from the latest *published* GitHub
    # Release and ignores drafts. The release-please job above opened the next
    # release PR in this same run, while this release was still a draft, so that
    # PR was computed with no baseline and re-lists every already-shipped commit
    # as a phantom version bump. release-please will NOT clean that up on its own:
    # when a later run finds no new commits it just skips, leaving the orphan PR
    # open. So close it here now that the release is published, then re-dispatch
    # the workflow. The re-dispatch sees the published release and recreates a
    # CORRECT next PR only if real unreleased commits exist; otherwise it finds
    # nothing and stops without reaching this job again, so the re-trigger is
    # bounded to one run. (workflow_dispatch is the documented exception to
    # GITHUB_TOKEN loop-prevention, so no PAT is required.)
    needs: [release-please, publish-release]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    name: Reconcile next release PR
    permissions:
      contents: write  # IMPORTANT: Mandatory for `gh pr close --delete-branch` (deletes the ref)
      pull-requests: write  # IMPORTANT: Mandatory to close the phantom release PR
      actions: write  # IMPORTANT: Mandatory to re-dispatch this workflow
    steps:
      - name: Close the phantom PR and re-dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job, so gh needs the repo set explicitly
          # (gh reads GH_REPO, not GITHUB_REPOSITORY).
          GH_REPO: ${{ github.repository }}
          # Route through env and quote in-shell rather than interpolating the
          # expansion bare into the command (robust against unusual ref names).
          REF_NAME: ${{ github.ref_name }}
        run: |
          pr="$(gh pr list --state open \
            --head "release-please--branches--${REF_NAME}" \
            --json number --jq '.[0].number // empty')"
          if [ -n "$pr" ]; then
            echo "Closing phantom release PR #$pr"
            gh pr close "$pr" --delete-branch
          fi
          gh workflow run "${{ github.workflow }}" --ref "$REF_NAME"
