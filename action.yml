---
name: cobo update fragments
description: Re-render drifted cobo fragments and open a pull request.
branding:
  icon: refresh-cw
  color: blue
inputs:
  config:
    description: Path to a cobo config TOML (sets COBO_CONFIG). Optional.
    required: false
    default: ""
  exclude:
    description: Newline- or space-separated glob patterns of fragment paths to skip.
    required: false
    default: ""
  pr-title:
    description: Title for the opened pull request.
    required: false
    default: "chore: update cobo fragments"
  pr-labels:
    description: Comma-separated labels for the pull request.
    required: false
    default: cobo
  branch:
    description: Branch the action pushes updates to.
    required: false
    default: cobo/update-fragments
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v6
    - name: Sync fragments
      id: sync
      shell: bash
      env:
        COBO_CONFIG: ${{ inputs.config }}
        ACTION_PATH: ${{ github.action_path }}
        COBO_EXCLUDE: ${{ inputs.exclude }}
      run: |
        set -uo pipefail
        # Run the cobo that ships with this action ref (not whatever is newest
        # on PyPI), so the CLI and lockfile schema can never drift apart.
        cobo=(uvx --from "$ACTION_PATH" cobo)
        # Turn newline/space-separated exclude patterns into repeated --exclude.
        read -ra patterns <<< "$COBO_EXCLUDE"
        exclude=()
        for pattern in "${patterns[@]}"; do
          exclude+=(--exclude "$pattern")
        done
        # Capture the drift that motivates this PR *before* sync runs: sync
        # advances the lockfile, after which `check` would report nothing.
        "${cobo[@]}" check --json "${exclude[@]}" > cobo-check.json || true
        # Re-render outdated fragments. A non-zero exit means some fragment
        # failed to re-render; still open a PR for the ones that succeeded and
        # record the failure so it surfaces in the PR body instead of aborting.
        if "${cobo[@]}" sync "${exclude[@]}"; then
          echo "sync_failed=false" >> "$GITHUB_OUTPUT"
        else
          echo "sync_failed=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Build PR body
      id: body
      shell: bash
      env:
        SYNC_FAILED: ${{ steps.sync.outputs.sync_failed }}
      run: |
        {
          echo "body<<EOF"
          echo "Automated cobo fragment update."
          echo
          if [ "$SYNC_FAILED" = "true" ]; then
            echo "> [!WARNING]"
            echo "> Some fragments failed to re-render. See the workflow log."
            echo
          fi
          echo "Drift detected before sync:"
          echo '```json'
          cat cobo-check.json
          echo '```'
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        rm -f cobo-check.json
    - name: Create pull request
      uses: peter-evans/create-pull-request@v7
      with:
        title: ${{ inputs.pr-title }}
        labels: ${{ inputs.pr-labels }}
        branch: ${{ inputs.branch }}
        body: ${{ steps.body.outputs.body }}
        commit-message: ${{ inputs.pr-title }}
