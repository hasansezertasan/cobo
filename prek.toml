# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-toml" },
  { id = "check-yaml", args = ["--unsafe"] },
  { id = "check-json", exclude = '^\.vscode/launch\.json$' },
  { id = "check-merge-conflict" },
  { id = "end-of-file-fixer" },
  # `.gitignore` is a cobo-managed block (dogfooding, see cobo.lock): its body
  # must stay byte-identical to the upstream templates, which carry a couple of
  # trailing spaces. Stripping them would edit the managed region and make
  # `cobo check` report it MODIFIED, so this hook skips the file.
  { id = "trailing-whitespace", exclude = '^\.gitignore$' },
  { id = "debug-statements" },
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.32"
hooks = [{ id = "uv-lock" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.22"
hooks = [{ id = "ruff-check" }, { id = "ruff-format" }]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "v1.48.0"
hooks = [{ id = "typos" }]
